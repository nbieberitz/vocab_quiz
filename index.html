<style>
:root{--bg:#0b0b0f;--surface:#13131a;--surface2:#1c1c27;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);--text:#f0eeea;--muted:#6b6a72;--accent:#c8f04a;--accent2:#8b5cf6;--correct:#4ade80;--wrong:#f87171;--correct-bg:rgba(74,222,128,0.1);--wrong-bg:rgba(248,113,113,0.1);--correct-border:rgba(74,222,128,0.35);--wrong-border:rgba(248,113,113,0.35)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;top:-20vh;left:50%;transform:translateX(-50%);width:70vw;height:50vh;background:radial-gradient(ellipse,rgba(139,92,246,0.12) 0%,transparent 70%);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:660px;margin:0 auto;padding:2.5rem 1.25rem 4rem}
.header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:2rem;gap:1rem}
.logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,8vw,4rem);letter-spacing:0.03em;line-height:1;color:var(--text)}
.logo span{color:var(--accent)}
.mode-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:40px;padding:4px;gap:2px}
.mode-btn{padding:7px 18px;border:none;border-radius:36px;background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;letter-spacing:0.04em;cursor:pointer;transition:all .2s;text-transform:uppercase}
.mode-btn.active{background:var(--accent);color:#0b0b0f;font-weight:500}
.lesson-row{display:flex;gap:8px;margin-bottom:1.75rem;flex-wrap:wrap}
.lesson-pill{padding:6px 14px;border:1px solid var(--border);border-radius:30px;background:var(--surface);color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.05em;cursor:pointer;transition:all .15s;text-transform:uppercase;white-space:nowrap}
.lesson-pill:hover{border-color:var(--border2);color:var(--text)}
.lesson-pill.active{border-color:var(--accent);background:rgba(200,240,74,0.08);color:var(--accent)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;text-align:center}
.stat-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:300;color:var(--text);font-variant-numeric:tabular-nums}
.progress-bar{height:3px;background:var(--surface2);border-radius:2px;margin-bottom:1.75rem;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1);box-shadow:0 0 10px rgba(200,240,74,0.4)}
.qcard{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2rem;animation:fadeUp .3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.lesson-tag{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent2);margin-bottom:1.1rem}
.question{font-size:15px;color:var(--muted);margin-bottom:0.4rem;font-weight:300}
.question-word{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.2rem,7vw,3.2rem);letter-spacing:0.04em;color:var(--text);line-height:1.1;margin-bottom:1.75rem}
.options{display:flex;flex-direction:column;gap:10px}
.opt{padding:14px 18px;border:1px solid var(--border);border-radius:12px;cursor:pointer;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--bg);text-align:left;transition:all .15s;line-height:1.55;position:relative;overflow:hidden}
.opt::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(200,240,74,0.06),transparent);opacity:0;transition:opacity .15s}
.opt:hover:not(.disabled)::before{opacity:1}
.opt:hover:not(.disabled){border-color:var(--border2)}
.opt.correct{border-color:var(--correct-border);background:var(--correct-bg);color:var(--correct)}
.opt.wrong{border-color:var(--wrong-border);background:var(--wrong-bg);color:var(--wrong)}
.opt.disabled{cursor:default}
.opt-letter{display:inline-block;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.05em;color:var(--muted);margin-right:10px;min-width:16px}
.opt.correct .opt-letter{color:var(--correct)}

.next-btn:hover{background:var(--surface2);border-color:var(--accent);color:var(--accent)}
.result{text-align:center;padding:2.5rem 1.5rem;animation:fadeUp .35s ease both}
.big-score{font-family:'Bebas Neue',sans-serif;font-size:clamp(5rem,20vw,9rem);letter-spacing:0.02em;line-height:1;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:0.5rem}
.result-pct{font-family:'DM Mono',monospace;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem}
.result-msg{font-size:16px;color:var(--text);font-weight:300;line-height:1.7;max-width:400px;margin:0 auto 2rem}
.result-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:2rem}
.rbtn{padding:11px 24px;border:1px solid var(--border2);border-radius:30px;background:transparent;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.rbtn:hover{border-color:var(--accent);color:var(--accent)}
.rbtn.primary{background:var(--accent);border-color:var(--accent);color:#0b0b0f}
.rbtn.primary:hover{background:#d4f55a}
.review-section{text-align:left;margin-top:1.5rem}
.review-header{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.review-item{padding:12px 0;border-bottom:1px solid var(--border)}
.review-word{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:0.04em;color:var(--wrong);margin-bottom:3px}
.review-def{font-size:13px;color:var(--muted);line-height:1.6}
.flash-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem 2rem;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;animation:fadeUp .3s ease both;text-align:center;position:relative;overflow:hidden;margin-bottom:1rem}
.flash-card::after{content:'TAP TO FLIP';position:absolute;bottom:14px;right:18px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.12em;color:var(--muted);opacity:0.5}
.flash-card:hover{border-color:var(--border2)}
.flash-card.flipped{background:var(--surface2);border-color:rgba(139,92,246,0.25)}
.flash-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem}
.flash-word{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.8rem,10vw,4.5rem);letter-spacing:0.05em;line-height:1;color:var(--text)}
.flash-def{font-size:16px;font-weight:300;color:var(--text);line-height:1.7;max-width:480px}
.flash-lesson{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.08em;color:var(--accent2);margin-top:1rem}
.flash-nav{display:flex;gap:10px;justify-content:center}
.fnav-btn{flex:1;max-width:140px;padding:11px;border:1px solid var(--border);border-radius:12px;background:var(--surface);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.fnav-btn:hover{border-color:var(--border2);background:var(--surface2)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}
</style>
</head>

function buildLessonRow(){
  const row=document.getElementById('lesson-row');
  const pills=[{id:'all',label:'All 150'},...Array.from({length:15},(_,i)=>({id:i+1,label:`L${i+1}`}))];
  row.innerHTML=pills.map(l=>`<button class="lesson-pill${l.id===selectedLesson?' active':''}" onclick="selectLesson('${l.id}')">${l.label}</button>`).join('');
}

function selectLesson(id){
  selectedLesson=id==='all'?'all':parseInt(id);
  buildLessonRow();startSession();
}

function getPool(){return selectedLesson==='all'?[...ALL]:ALL.filter(x=>x.l===selectedLesson);}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function setMode(m){
  mode=m;
  document.getElementById('mode-quiz').className='mode-btn'+(m==='quiz'?' active':'');
  document.getElementById('mode-flash').className='mode-btn'+(m==='flash'?' active':'');
  startSession();
}

function startSession(){
  pool=getPool();queue=shuffle([...pool]);
  current=0;score=0;answered=false;wrong=[];flashIdx=0;flashFlipped=false;
  render();
}

function makeOptions(item){
  const w3=shuffle(pool.filter(x=>x.w!==item.w)).slice(0,3);
  return shuffle([item,...w3]);
}

function render(){
  const app=document.getElementById('app');
  if(mode==='flash'){renderFlash(app);return;}
  if(current>=queue.length){renderResult(app);return;}
  const item=queue[current];
  const opts=makeOptions(item);
  const pct=Math.round((current/queue.length)*100);
  const lname=selectedLesson==='all'?`Lesson ${item.l} · ${LESSON_NAMES[item.l]}`:LESSON_NAMES[item.l];
  const safeOpts=opts.map(o=>({...o,ws:o.w.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}));
  const itemWs=item.w.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  app.innerHTML=`
    <div class="stats">
      <div class="stat"><div class="stat-label">Question</div><div class="stat-val">${current+1}<span style="font-size:14px;color:var(--muted)">/${queue.length}</span></div></div>
      <div class="stat"><div class="stat-label">Correct</div><div class="stat-val">${score}</div></div>
      <div class="stat"><div class="stat-label">Score</div><div class="stat-val">${current>0?Math.round(score/current*100):0}<span style="font-size:14px;color:var(--muted)">%</span></div></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="qcard">
      <div class="lesson-tag">${lname}</div>
      <div class="question">What does this word mean?</div>
      <div class="question-word">${item.w}</div>
      <div class="options" id="opts">
        ${safeOpts.map((o,i)=>`<button class="opt" id="opt-${i}" onclick="pick(${i},'${o.ws}','${itemWs}')"><span class="opt-letter">${LETTERS[i]}</span>${o.d}</button>`).join('')}
      </div>
      <button class="next-btn" id="nxt" style="display:none" onclick="nextQ()">Continue →</button>
    </div>`;
}

function pick(idx,chosen,correct){
  if(answered)return;
  answered=true;
  const isRight=chosen===correct;
  if(isRight){score++;}else{wrong.push(queue[current]);}
  const item=queue[current];
  const optEls=document.getElementById('opts').children;
  for(let i=0;i<optEls.length;i++){
    optEls[i].classList.add('disabled');
    const txt=optEls[i].querySelector('.opt-letter').nextSibling;
    const def=txt?txt.textContent.trim():(optEls[i].textContent.trim().slice(1));
    if(def===item.d){optEls[i].classList.add('correct');}
    else if(i===idx&&!isRight){optEls[i].classList.add('wrong');}
  }
  document.getElementById('nxt').style.display='block';
}

function nextQ(){answered=false;current++;render();}

function renderResult(app){
  const pct=Math.round(score/queue.length*100);
  const msg=pct>=90?'Exceptional. Your vocabulary is genuinely impressive.':pct>=70?'Solid work. A little more review and you\'ll dominate.':pct>=50?'Good start. Focus on the words below and try again.':'Words are powerful — keep studying and you\'ll get there.';
  const rev=wrong.length?`<div class="review-section">
    <div class="review-header">Review these ${wrong.length} word${wrong.length>1?'s':''}</div>
    ${wrong.map(w=>`<div class="review-item"><div class="review-word">${w.w}</div><div class="review-def">${w.d}</div></div>`).join('')}
  </div>`:`<div style="font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--correct);margin-top:1rem">Perfect — no words to review</div>`;
  app.innerHTML=`<div class="qcard result">
    <div class="big-score">${score}/${queue.length}</div>
    <div class="result-pct">${pct}% correct</div>
    <div class="result-msg">${msg}</div>
    <div class="result-btns">
      <button class="rbtn primary" onclick="startSession()">Retake</button>
      ${wrong.length?`<button class="rbtn" onclick="retakeWrong()">Study missed only</button>`:''}
    </div>
    ${rev}
  </div>`;
}

function retakeWrong(){queue=shuffle([...wrong]);current=0;score=0;answered=false;wrong=[];render();}

function renderFlash(app){
  if(!pool.length){app.innerHTML='<div class="qcard" style="text-align:center;padding:2rem;color:var(--muted)">No words in this selection.</div>';return;}
  if(flashIdx>=pool.length)flashIdx=0;
  const item=pool[flashIdx];
  app.innerHTML=`
    <div class="stats">
      <div class="stat"><div class="stat-label">Card</div><div class="stat-val">${flashIdx+1}<span style="font-size:14px;color:var(--muted)">/${pool.length}</span></div></div>
      <div class="stat"><div class="stat-label">Lesson</div><div class="stat-val">${item.l}</div></div>
    </div>
    <div class="flash-card${flashFlipped?' flipped':''}" onclick="flipCard()">
      <div class="flash-label">${flashFlipped?'Definition':'Word'}</div>
      ${flashFlipped
        ?`<div class="flash-def">${item.d}</div><div class="flash-lesson">Lesson ${item.l} · ${LESSON_NAMES[item.l]}</div>`
        :`<div class="flash-word">${item.w}</div>`}
    </div>
    <div class="flash-nav">
      <button class="fnav-btn" onclick="flashNav(-1)">← Prev</button>
      <button class="fnav-btn" onclick="shuffleFlash()">Shuffle</button>
      <button class="fnav-btn" onclick="flashNav(1)">Next →</button>
    </div>`;
}

function flipCard(){flashFlipped=!flashFlipped;renderFlash(document.getElementById('app'));}
function flashNav(d){flashIdx=(flashIdx+d+pool.length)%pool.length;flashFlipped=false;renderFlash(document.getElementById('app'));}
function shuffleFlash(){pool=shuffle([...pool]);flashIdx=0;flashFlipped=false;renderFlash(document.getElementById('app'));}

buildLessonRow();
startSession();
</script>
</body>
</html>
