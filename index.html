<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocab Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05080f;
  --surface:#0b1120;
  --surface2:#111a2e;
  --border:rgba(0,200,255,0.08);
  --border2:rgba(0,200,255,0.22);
  --text:#e8eef8;
  --muted:#4a5a78;
  --accent:#00d4ff;
  --accent2:#f5a623;
  --correct:#00e5a0;
  --wrong:#ff5c7a;
  --correct-bg:rgba(0,229,160,0.08);
  --wrong-bg:rgba(255,92,122,0.08);
  --correct-border:rgba(0,229,160,0.3);
  --wrong-border:rgba(255,92,122,0.3);
  --glow:rgba(0,212,255,0.15);
  --glow2:rgba(245,166,35,0.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* Layered background: dots + dual glow orbs */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:radial-gradient(circle,rgba(0,180,255,0.07) 1px,transparent 1px);
  background-size:28px 28px;
  pointer-events:none;z-index:0;
}
body::after{
  content:'';
  position:fixed;
  top:-15vh;left:60%;
  width:60vw;height:55vh;
  background:radial-gradient(ellipse,rgba(0,200,255,0.13) 0%,transparent 65%);
  pointer-events:none;z-index:0;
}
.orb-bottom{
  position:fixed;
  bottom:-10vh;left:-5vw;
  width:45vw;height:40vh;
  background:radial-gradient(ellipse,rgba(245,166,35,0.1) 0%,transparent 65%);
  pointer-events:none;z-index:0;
}

.wrap{position:relative;z-index:1;max-width:660px;margin:0 auto;padding:2.5rem 1.25rem 4rem}

/* Header */
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem;gap:1rem}
.logo-wrap{display:flex;flex-direction:column;gap:2px}
.logo-eyebrow{
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--accent);
  opacity:0.7;
}
.logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(2.8rem,9vw,4.4rem);
  letter-spacing:0.06em;line-height:0.95;
  color:var(--text);
}
.logo em{
  font-style:normal;
  color:var(--accent);
  text-shadow:0 0 24px rgba(0,212,255,0.55),0 0 50px rgba(0,212,255,0.2);
}
.logo-sub{
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--muted);
  margin-top:3px;
}

/* Mode toggle */
.mode-toggle{
  display:flex;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:40px;
  padding:4px;gap:2px;
  box-shadow:0 0 16px rgba(0,212,255,0.06);
}
.mode-btn{
  padding:7px 18px;
  border:none;border-radius:36px;
  background:transparent;
  color:var(--muted);
  font-family:'DM Mono',monospace;
  font-size:12px;letter-spacing:0.06em;
  cursor:pointer;transition:all .2s;
  text-transform:uppercase;
}
.mode-btn.active{
  background:linear-gradient(135deg,var(--accent),rgba(0,180,220,0.85));
  color:#050810;
  font-weight:500;
  box-shadow:0 0 12px rgba(0,212,255,0.35);
}

/* Direction toggle */
.dir-row{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem}
.dir-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.dir-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:40px;padding:3px;gap:2px;flex:1}
.dir-btn{
  flex:1;padding:6px 10px;
  border:none;border-radius:36px;
  background:transparent;
  color:var(--muted);
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:0.05em;
  cursor:pointer;transition:all .2s;
  text-transform:uppercase;white-space:nowrap;
}
.dir-btn.active{
  background:rgba(245,166,35,0.15);
  color:var(--accent2);
  border:1px solid rgba(245,166,35,0.3);
  box-shadow:0 0 10px rgba(245,166,35,0.15);
}

/* Lesson pills */
.lesson-row{display:flex;gap:7px;margin-bottom:1.75rem;flex-wrap:wrap}
.lesson-pill{
  padding:6px 13px;
  border:1px solid var(--border);
  border-radius:30px;
  background:var(--surface);
  color:var(--muted);
  font-family:'DM Mono',monospace;
  font-size:11px;letter-spacing:0.06em;
  cursor:pointer;transition:all .15s;
  text-transform:uppercase;white-space:nowrap;
}
.lesson-pill:hover{border-color:var(--border2);color:var(--text)}
.lesson-pill.active{
  border-color:var(--accent);
  background:rgba(0,212,255,0.07);
  color:var(--accent);
  box-shadow:0 0 10px rgba(0,212,255,0.15);
}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.stat{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px 14px;text-align:center;
  backdrop-filter:blur(8px);
}
.stat-label{
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--muted);margin-bottom:4px;
}
.stat-val{
  font-size:22px;font-weight:300;
  color:var(--text);
  font-variant-numeric:tabular-nums;
}

/* Progress bar */
.progress-bar{height:2px;background:var(--surface2);border-radius:2px;margin-bottom:1.75rem;overflow:visible}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent2),var(--accent));
  border-radius:2px;
  transition:width .4s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 8px rgba(0,212,255,0.6),0 0 20px rgba(0,212,255,0.25);
  position:relative;
}
.progress-fill::after{
  content:'';
  position:absolute;right:-3px;top:50%;transform:translateY(-50%);
  width:6px;height:6px;
  border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 8px var(--accent),0 0 16px var(--accent);
}

/* Question card */
.qcard{
  background:linear-gradient(145deg,var(--surface),rgba(11,17,32,0.95));
  border:1px solid var(--border);
  border-radius:22px;
  padding:2rem;
  animation:fadeUp .3s ease both;
  box-shadow:0 4px 40px rgba(0,0,0,0.4),0 0 0 1px rgba(0,200,255,0.04);
  backdrop-filter:blur(12px);
  position:relative;overflow:hidden;
}
.qcard::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,212,255,0.25),transparent);
}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.lesson-tag{
  font-family:'DM Mono',monospace;
  font-size:11px;letter-spacing:0.14em;
  text-transform:uppercase;
  color:var(--accent2);
  margin-bottom:1.1rem;
  opacity:0.85;
}
.question{
  font-size:13px;color:var(--muted);
  margin-bottom:0.35rem;font-weight:300;
  letter-spacing:0.02em;
}
.question-word{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(2.4rem,7vw,3.4rem);
  letter-spacing:0.05em;color:var(--text);
  line-height:1.1;margin-bottom:1.75rem;
  text-shadow:0 0 30px rgba(0,212,255,0.12);
}

/* Options */
.options{display:flex;flex-direction:column;gap:9px}
.opt{
  padding:13px 17px;
  border:1px solid var(--border);
  border-radius:13px;
  cursor:pointer;
  font-size:14px;font-family:'DM Sans',sans-serif;
  color:var(--text);
  background:rgba(5,8,15,0.6);
  text-align:left;
  transition:all .15s;
  line-height:1.55;
  position:relative;overflow:hidden;
}
.opt::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(0,212,255,0.05),transparent 60%);
  opacity:0;transition:opacity .15s;
}
.opt:hover:not(.disabled)::before{opacity:1}
.opt:hover:not(.disabled){
  border-color:var(--border2);
  background:rgba(0,212,255,0.04);
  box-shadow:0 0 16px rgba(0,212,255,0.08);
  transform:translateX(2px);
}
.opt.correct{
  border-color:var(--correct-border);
  background:var(--correct-bg);
  color:var(--correct);
  box-shadow:0 0 16px rgba(0,229,160,0.12);
}
.opt.wrong{
  border-color:var(--wrong-border);
  background:var(--wrong-bg);
  color:var(--wrong);
}
.opt.disabled{cursor:default;transform:none}
.opt-letter{
  display:inline-block;
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:0.06em;
  color:var(--muted);
  margin-right:10px;
  min-width:16px;
}
.opt.correct .opt-letter{color:var(--correct)}
.opt.wrong .opt-letter{color:var(--wrong)}

/* Next button */
.next-btn{
  width:100%;margin-top:12px;padding:13px;
  border:1px solid var(--border2);
  border-radius:13px;
  background:transparent;
  color:var(--accent);
  font-family:'DM Mono',monospace;
  font-size:12px;letter-spacing:0.1em;
  text-transform:uppercase;
  cursor:pointer;
  transition:all .15s;
  animation:fadeUp .25s .1s ease both;
}
.next-btn:hover{
  background:rgba(0,212,255,0.08);
  border-color:var(--accent);
  box-shadow:0 0 20px rgba(0,212,255,0.15);
}

/* Results */
.result{text-align:center;padding:2.5rem 1.5rem;animation:fadeUp .35s ease both}
.big-score{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(5rem,20vw,9rem);
  letter-spacing:0.02em;line-height:1;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:0.5rem;
  filter:drop-shadow(0 0 20px rgba(0,212,255,0.3));
}
.result-pct{
  font-family:'DM Mono',monospace;
  font-size:12px;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--muted);margin-bottom:1rem;
}
.result-msg{
  font-size:15px;color:var(--text);
  font-weight:300;line-height:1.75;
  max-width:400px;margin:0 auto 2rem;
  opacity:0.8;
}
.result-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:2rem}
.rbtn{
  padding:11px 24px;
  border:1px solid var(--border2);
  border-radius:30px;
  background:transparent;
  color:var(--text);
  font-family:'DM Mono',monospace;
  font-size:12px;letter-spacing:0.06em;
  text-transform:uppercase;cursor:pointer;transition:all .15s;
}
.rbtn:hover{border-color:var(--accent);color:var(--accent);box-shadow:0 0 14px rgba(0,212,255,0.15)}
.rbtn.primary{
  background:linear-gradient(135deg,var(--accent),rgba(0,180,220,0.85));
  border-color:transparent;color:#050810;
  box-shadow:0 0 20px rgba(0,212,255,0.3);
}
.rbtn.primary:hover{box-shadow:0 0 30px rgba(0,212,255,0.5);filter:brightness(1.08)}

/* Review section */
.review-section{text-align:left;margin-top:1.5rem}
.review-header{
  font-family:'DM Mono',monospace;font-size:11px;
  letter-spacing:0.12em;text-transform:uppercase;
  color:var(--muted);margin-bottom:12px;
}
.review-item{padding:12px 0;border-bottom:1px solid var(--border)}
.review-word{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.4rem;letter-spacing:0.04em;
  color:var(--wrong);margin-bottom:3px;
}
.review-def{font-size:13px;color:var(--muted);line-height:1.6}

/* Flash cards */
.flash-card{
  background:linear-gradient(145deg,var(--surface),rgba(11,17,32,0.95));
  border:1px solid var(--border);
  border-radius:22px;
  padding:2.5rem 2rem;min-height:220px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  cursor:pointer;
  transition:all .2s;
  animation:fadeUp .3s ease both;
  text-align:center;
  position:relative;overflow:hidden;
  margin-bottom:1rem;
  box-shadow:0 4px 40px rgba(0,0,0,0.4);
}
.flash-card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,212,255,0.2),transparent);
}
.flash-card::after{
  content:'TAP TO FLIP';
  position:absolute;bottom:14px;right:18px;
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:0.12em;color:var(--muted);opacity:0.4;
}
.flash-card:hover{
  border-color:var(--border2);
  box-shadow:0 8px 40px rgba(0,0,0,0.5),0 0 20px rgba(0,212,255,0.06);
}
.flash-card.flipped{
  background:linear-gradient(145deg,var(--surface2),rgba(11,17,32,0.98));
  border-color:rgba(245,166,35,0.2);
  box-shadow:0 4px 40px rgba(0,0,0,0.4),0 0 20px rgba(245,166,35,0.07);
}
.flash-label{
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:0.16em;text-transform:uppercase;
  color:var(--muted);margin-bottom:1rem;
}
.flash-word{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(2.8rem,10vw,4.5rem);
  letter-spacing:0.05em;line-height:1;
  color:var(--text);
  text-shadow:0 0 30px rgba(0,212,255,0.1);
}
.flash-def{
  font-size:16px;font-weight:300;
  color:var(--text);line-height:1.7;max-width:480px;
}
.flash-lesson{
  font-family:'DM Mono',monospace;font-size:11px;
  letter-spacing:0.08em;color:var(--accent2);
  margin-top:1rem;opacity:0.8;
}

/* Flash nav */
.flash-nav{display:flex;gap:10px;justify-content:center}
.fnav-btn{
  flex:1;max-width:140px;padding:11px;
  border:1px solid var(--border);
  border-radius:13px;
  background:var(--surface);
  color:var(--text);
  font-family:'DM Mono',monospace;
  font-size:12px;letter-spacing:0.06em;
  text-transform:uppercase;cursor:pointer;transition:all .15s;
}
.fnav-btn:hover{
  border-color:var(--border2);
  background:var(--surface2);
  color:var(--accent);
}

/* API key banner */
.apikey-bar{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:13px;
  padding:11px 14px;
  margin-bottom:1.25rem;
  animation:fadeUp .3s ease both;
}
.apikey-bar label{
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:0.1em;text-transform:uppercase;
  color:var(--muted);white-space:nowrap;
}
.apikey-bar input{
  flex:1;background:transparent;border:none;outline:none;
  font-family:'DM Mono',monospace;font-size:12px;
  color:var(--text);letter-spacing:0.04em;
  min-width:0;
}
.apikey-bar input::placeholder{color:var(--muted);opacity:0.5}
.apikey-save{
  padding:5px 12px;border-radius:20px;
  border:1px solid var(--border2);
  background:transparent;color:var(--accent);
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:0.07em;text-transform:uppercase;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.apikey-save:hover{background:rgba(0,212,255,0.08);border-color:var(--accent)}
.apikey-saved{color:var(--correct);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.07em;white-space:nowrap}

/* Example button & panel */
.example-btn{
  display:inline-flex;align-items:center;gap:5px;
  margin-top:9px;
  padding:5px 12px;
  border:1px solid rgba(245,166,35,0.3);
  border-radius:20px;
  background:rgba(245,166,35,0.07);
  color:var(--accent2);
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:0.09em;
  text-transform:uppercase;
  cursor:pointer;
  transition:all .15s;
  animation:fadeUp .2s ease both;
}
.example-btn:hover{
  background:rgba(245,166,35,0.14);
  border-color:rgba(245,166,35,0.55);
  box-shadow:0 0 12px rgba(245,166,35,0.18);
}
.example-btn svg{flex-shrink:0}
.example-panel{
  margin-top:10px;
  padding:13px 15px;
  border:1px solid rgba(245,166,35,0.18);
  border-radius:12px;
  background:rgba(245,166,35,0.05);
  animation:fadeUp .25s ease both;
  font-size:13px;
  line-height:1.7;
}
.example-panel .ex-sentence{
  color:var(--text);font-weight:300;margin-bottom:6px;
}
.example-panel .ex-sentence em{
  font-style:italic;color:var(--accent2);
}
.example-panel .ex-tip{
  font-family:'DM Mono',monospace;font-size:11px;
  letter-spacing:0.04em;color:var(--muted);
  border-top:1px solid rgba(245,166,35,0.12);
  padding-top:7px;margin-top:2px;
}
.example-panel .ex-loading{
  display:flex;align-items:center;gap:8px;
  font-family:'DM Mono',monospace;font-size:11px;
  letter-spacing:0.08em;text-transform:uppercase;
  color:var(--muted);
}
.spin{
  width:13px;height:13px;flex-shrink:0;
  border:2px solid rgba(245,166,35,0.2);
  border-top-color:var(--accent2);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}

.kbd-hint{
  display:flex;gap:1.5rem;justify-content:center;
  margin-top:10px;
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:0.06em;color:var(--muted);
  opacity:0.5;
}
kbd{
  display:inline-block;
  padding:2px 6px;
  border:1px solid var(--border2);
  border-radius:5px;
  font-family:'DM Mono',monospace;
  font-size:10px;
  color:var(--muted);
  margin:0 2px;
  background:var(--surface2);
}
</style>
</head>
<body>
<div class="orb-bottom"></div>
<div class="wrap">
  <div class="header">
    <div class="logo-wrap">
      <span class="logo-eyebrow">English Final · Vocabulary</span>
      <div class="logo">VOCABULARY <em>QUIZ</em></div>
      <span class="logo-sub">150 words &nbsp;·&nbsp; 15 lessons</span>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="mode-quiz" onclick="setMode('quiz')">Practice</button>
      <button class="mode-btn" id="mode-flash" onclick="setMode('flash')">Flashcards</button>
    </div>
  </div>
  <div class="lesson-row" id="lesson-row"></div>
  <div class="dir-row" id="dir-row">
    <span class="dir-label">Mode</span>
    <div class="dir-toggle">
      <button class="dir-btn active" id="dir-word" onclick="setDir('word')">Word → Def</button>
      <button class="dir-btn" id="dir-def" onclick="setDir('def')">Def → Word</button>
      <button class="dir-btn" id="dir-random" onclick="setDir('random')">Random</button>
    </div>
  </div>
  <div class="apikey-bar" id="apikey-bar">
    <label>API Key</label>
    <input type="password" id="apikey-input" placeholder="sk-ant-… (needed for Example sentences)" autocomplete="off" oninput="onKeyInput()"/>
    <button class="apikey-save" id="apikey-btn" onclick="saveKey()">Save</button>
  </div>
  <div id="app"></div>
  <div style="margin-top:3rem;padding-top:1.5rem;border-top:1px solid var(--border);text-align:center;">
    <p style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.06em;color:var(--muted);line-height:1.8;">
      Spot a mistake in a word or definition?<br>
      <a href="mailto:bieberna27@collegedaleacademy.com" style="color:var(--accent);text-decoration:none;opacity:0.8;transition:opacity .15s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.8'">bieberna27@collegedaleacademy.com</a>
      <span style="display:block;margin-top:4px;font-size:10px;opacity:0.5;">and it'll get fixed.</span>
    </p>
  </div>
</div>
<script>
const LESSON_NAMES={1:'Language',2:'Possibility',3:'Change',4:'Mind & Knowledge',5:'Avoidance',6:'Sequence',7:'Criticism',8:'Responsibility',9:'Behavior',10:'Skill',11:'Commands',12:'Size',13:'Imitation',14:'Pairs',15:'Reversal'};

const LETTERS=['A','B','C','D'];
let mode='quiz',dir='word',selectedLesson='all',pool=[],queue=[],current=0,score=0,answered=false,wrong=[],flashIdx=0,flashFlipped=false;

function setDir(d){
  dir=d;
  ['word','def','random'].forEach(k=>{
    document.getElementById('dir-'+k).className='dir-btn'+(d===k?' active':'');
  });
  startSession();
}

function buildLessonRow(){
  const row=document.getElementById('lesson-row');
  const pills=[{id:'all',label:'All 150'},...Array.from({length:15},(_,i)=>({id:i+1,label:`L${i+1}`}))];
  row.innerHTML=pills.map(l=>`<button class="lesson-pill${l.id===selectedLesson?' active':''}" onclick="selectLesson('${l.id}')">${l.label}</button>`).join('');
}

function selectLesson(id){
  selectedLesson=id==='all'?'all':parseInt(id);
  buildLessonRow();startSession();
}

function getPool(){return selectedLesson==='all'?[...ALL]:ALL.filter(x=>x.l===selectedLesson);}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function setMode(m){
  mode=m;
  document.getElementById('mode-quiz').className='mode-btn'+(m==='quiz'?' active':'');
  document.getElementById('mode-flash').className='mode-btn'+(m==='flash'?' active':'');
  document.getElementById('dir-row').style.display=m==='quiz'?'flex':'none';
  startSession();
}

function startSession(){
  pool=getPool();queue=shuffle([...pool]);
  current=0;score=0;answered=false;wrong=[];flashIdx=0;flashFlipped=false;
  render();
}

function makeOptions(item,showWord){
  const p=getPool();
  if(showWord){
    // show definition, pick from words
    const w3=shuffle(p.filter(x=>x.w!==item.w)).slice(0,3);
    return shuffle([item,...w3]);
  } else {
    // show word, pick from definitions
    const w3=shuffle(p.filter(x=>x.w!==item.w)).slice(0,3);
    return shuffle([item,...w3]);
  }
}

function render(){
  const app=document.getElementById('app');
  if(mode==='flash'){renderFlash(app);return;}
  if(current>=queue.length){renderResult(app);return;}
  const item=queue[current];
  // determine direction for this question
  const showDef = dir==='word' ? false : dir==='def' ? true : Math.random()<0.5;
  // attach direction to item for pick() to use
  item._showDef=showDef;
  const opts=shuffle(getPool().filter(x=>x.w!==item.w)).slice(0,3);
  opts.push(item);
  const shuffled=shuffle(opts);
  const pct=Math.round((current/queue.length)*100);
  const lname=selectedLesson==='all'?`Lesson ${item.l} · ${LESSON_NAMES[item.l]}`:LESSON_NAMES[item.l];
  const dirLabel=showDef?'Which word fits this definition?':'Select the correct definition:';
  const prompt=showDef?`<div class="question">${dirLabel}</div><div class="question-word" style="font-size:clamp(1rem,3vw,1.25rem);font-family:'DM Sans',sans-serif;font-weight:300;line-height:1.7;letter-spacing:normal;color:var(--text);opacity:0.9">${item.d}</div>`:
    `<div class="question">${dirLabel}</div><div class="question-word">${item.w}</div>`;
  const optsHtml=shuffled.map((o,i)=>{
    const label=showDef?o.w:o.d;
    const safeLabel=label.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const safeKey=(showDef?o.w:o.d).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const safeCorrect=(showDef?item.w:item.d).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<button class="opt" id="opt-${i}" onclick="pick(${i},'${safeKey}','${safeCorrect}')"><span class="opt-letter">${LETTERS[i]}</span>${label}</button>`;
  }).join('');
  app.innerHTML=`
    <div class="stats">
      <div class="stat"><div class="stat-label">Progress</div><div class="stat-val">${current+1}<span style="font-size:14px;color:var(--muted)">/${queue.length}</span></div></div>
      <div class="stat"><div class="stat-label">Correct</div><div class="stat-val">${score}</div></div>
      <div class="stat"><div class="stat-label">Accuracy</div><div class="stat-val">${current>0?Math.round(score/current*100):0}<span style="font-size:14px;color:var(--muted)">%</span></div></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="qcard">
      <div class="lesson-tag">${lname}</div>
      ${prompt}
      <div class="options" id="opts">${optsHtml}</div>
      <button class="next-btn" id="nxt" style="display:none" onclick="nextQ()">Next Question →</button>
    </div>
    <div class="kbd-hint">
      <span><kbd>A</kbd><kbd>B</kbd><kbd>C</kbd><kbd>D</kbd> to answer</span>
      <span><kbd>Space</kbd> to advance</span>
    </div>`;
}

function pick(idx,chosen,correct){
  if(answered)return;
  answered=true;
  const isRight=chosen===correct;
  if(isRight){score++;}else{wrong.push(queue[current]);}
  const item=queue[current];
  const optEls=document.getElementById('opts').children;
  for(let i=0;i<optEls.length;i++){
    optEls[i].classList.add('disabled');
    const letter=optEls[i].querySelector('.opt-letter');
    const labelNode=letter.nextSibling;
    const label=labelNode?labelNode.textContent.trim():optEls[i].textContent.trim().slice(1);
    if(label===correct){
      optEls[i].classList.add('correct');
      // Inject example button below the correct option text
      const wrap=document.createElement('div');
      wrap.style.display='flex';wrap.style.flexDirection='column';wrap.style.alignItems='flex-start';
      // re-wrap existing content
      const existingContent=Array.from(optEls[i].childNodes);
      const inner=document.createElement('div');
      existingContent.forEach(n=>inner.appendChild(n));
      wrap.appendChild(inner);
      const exBtn=document.createElement('button');
      exBtn.className='example-btn';
      exBtn.innerHTML=`<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.5"/><line x1="6" y1="5" x2="6" y2="8.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="6" cy="3.5" r=".75" fill="currentColor"/></svg>Example sentence`;
      exBtn.onclick=e=>{e.stopPropagation();showExample(item.w,item.d,exBtn,wrap);};
      wrap.appendChild(exBtn);
      optEls[i].appendChild(wrap);
    }
    else if(i===idx&&!isRight){optEls[i].classList.add('wrong');}
  }
  document.getElementById('nxt').style.display='block';
}

// API key helpers
function getKey(){return localStorage.getItem('vocab_api_key')||'';}
function saveKey(){
  const v=document.getElementById('apikey-input').value.trim();
  if(!v)return;
  localStorage.setItem('vocab_api_key',v);
  const btn=document.getElementById('apikey-btn');
  btn.outerHTML='<span class="apikey-saved">✓ Saved</span>';
}
function onKeyInput(){
  // restore Save button if user types again after saving
  const btn=document.getElementById('apikey-btn');
  if(btn)btn.textContent='Save';
}
function initKeyBar(){
  const k=getKey();
  const input=document.getElementById('apikey-input');
  if(k){input.value=k;document.getElementById('apikey-btn').outerHTML='<span class="apikey-saved">✓ Saved</span>';}
}

async function showExample(word,def,btn,wrap){
  const key=getKey();
  if(!key){
    // Focus the key input and shake it
    const inp=document.getElementById('apikey-input');
    inp.focus();
    inp.style.transition='color .1s';
    inp.style.color='var(--wrong)';
    setTimeout(()=>inp.style.color='',600);
    return;
  }
  btn.remove();
  const panel=document.createElement('div');
  panel.className='example-panel';
  panel.innerHTML=`<div class="ex-loading"><div class="spin"></div>Generating…</div>`;
  wrap.appendChild(panel);
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:`You help students memorize vocabulary words. When given a word and its definition, respond with ONLY a JSON object (no markdown, no backticks) with two keys:
- "sentence": A vivid, memorable example sentence using the word naturally. Wrap the target word in <em> tags wherever it appears. Keep it 1-2 sentences.
- "tip": A short memory hook, etymology note, or usage clarification (1 sentence max). Plain text, no tags.`,
        messages:[{role:'user',content:`Word: ${word}\nDefinition: ${def}`}]
      })
    });
    const data=await res.json();
    if(data.error){throw new Error(data.error.message);}
    const text=data.content.find(c=>c.type==='text')?.text||'{}';
    let parsed;
    try{parsed=JSON.parse(text);}catch{parsed={sentence:`The word <em>${word}</em> is used in context.`,tip:''};}
    panel.innerHTML=`<div class="ex-sentence">${parsed.sentence}</div>${parsed.tip?`<div class="ex-tip">💡 ${parsed.tip}</div>`:''}`;
  }catch(err){
    panel.innerHTML=`<div class="ex-sentence" style="color:var(--wrong);font-size:12px">${err.message||'Could not load example. Check your API key.'}</div>`;
  }
}

function nextQ(){answered=false;current++;render();}

function renderResult(app){
  const pct=Math.round(score/queue.length*100);
  const msg=pct>=90?'Outstanding — you\'re more than ready for the final. Keep that momentum.':pct>=70?'Solid foundation. One more pass through the missed words and you\'ll be in great shape.':pct>=50?'You\'re getting there. Study the words below and run it again — consistency pays off.':'Don\'t sweat it. Review the list below, then come back. Every rep builds the memory.';
  const rev=wrong.length?`<div class="review-section">
    <div class="review-header">Study these ${wrong.length} word${wrong.length>1?'s':''} before your final</div>
    ${wrong.map(w=>`<div class="review-item"><div class="review-word">${w.w}</div><div class="review-def">${w.d}</div></div>`).join('')}
  </div>`:`<div style="font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--correct);margin-top:1rem">Flawless — nothing to review</div>`;
  app.innerHTML=`<div class="qcard result">
    <div class="big-score">${score}/${queue.length}</div>
    <div class="result-pct">${pct}% correct</div>
    <div class="result-msg">${msg}</div>
    <div class="result-btns">
      <button class="rbtn primary" onclick="startSession()">Try Again</button>
      ${wrong.length?`<button class="rbtn" onclick="retakeWrong()">Drill Missed Words</button>`:''}
    </div>
    ${rev}
  </div>`;
}

function retakeWrong(){queue=shuffle([...wrong]);current=0;score=0;answered=false;wrong=[];render();}

function renderFlash(app){
  if(!pool.length){app.innerHTML='<div class="qcard" style="text-align:center;padding:2rem;color:var(--muted)">No words in this selection.</div>';return;}
  if(flashIdx>=pool.length)flashIdx=0;
  const item=pool[flashIdx];
  app.innerHTML=`
    <div class="stats">
      <div class="stat"><div class="stat-label">Card</div><div class="stat-val">${flashIdx+1}<span style="font-size:14px;color:var(--muted)">/${pool.length}</span></div></div>
      <div class="stat"><div class="stat-label">Lesson</div><div class="stat-val">${item.l}</div></div>
    </div>
    <div class="flash-card${flashFlipped?' flipped':''}" onclick="flipCard()">
      <div class="flash-label">${flashFlipped?'Definition':'Word'}</div>
      ${flashFlipped
        ?`<div class="flash-def">${item.d}</div><div class="flash-lesson">Lesson ${item.l} · ${LESSON_NAMES[item.l]}</div>`
        :`<div class="flash-word">${item.w}</div>`}
    </div>
    <div class="flash-nav">
      <button class="fnav-btn" onclick="flashNav(-1)">← Back</button>
      <button class="fnav-btn" onclick="shuffleFlash()">Shuffle</button>
      <button class="fnav-btn" onclick="flashNav(1)">Forward →</button>
    </div>
    <div class="kbd-hint" style="margin-top:10px;">
      <span><kbd>←</kbd><kbd>→</kbd> navigate</span>
      <span><kbd>Space</kbd> to flip</span>
    </div>`;
}

function flipCard(){flashFlipped=!flashFlipped;renderFlash(document.getElementById('app'));}
function flashNav(d){flashIdx=(flashIdx+d+pool.length)%pool.length;flashFlipped=false;renderFlash(document.getElementById('app'));}
function shuffleFlash(){pool=shuffle([...pool]);flashIdx=0;flashFlipped=false;renderFlash(document.getElementById('app'));}

buildLessonRow();
startSession();
initKeyBar();

document.addEventListener('keydown', e => {
  const key = e.key.toUpperCase();
  if(mode === 'quiz') {
    // A/B/C/D to pick an answer
    const idx = ['A','B','C','D'].indexOf(key);
    if(idx !== -1) {
      const btn = document.getElementById('opt-' + idx);
      if(btn && !btn.classList.contains('disabled')) btn.click();
      return;
    }
    // Space or Enter to advance
    if((key === ' ' || e.key === 'Enter') && answered) {
      e.preventDefault();
      const nxt = document.getElementById('nxt');
      if(nxt && nxt.style.display !== 'none') nxt.click();
    }
  }
  if(mode === 'flash') {
    if(key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
    if(e.key === 'ArrowLeft')  flashNav(-1);
    if(e.key === 'ArrowRight') flashNav(1);
  }
});
</script>
</body>
</html>
