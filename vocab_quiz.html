<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Quiz — 15 Lessons</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#f5f4f0;color:#1a1a18;min-height:100vh;padding:1.5rem 1rem}
  .wrap{max-width:680px;margin:0 auto}
  h1{font-size:20px;font-weight:500;margin-bottom:1.25rem;color:#1a1a18}
  .top-bar{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
  .top-bar select{flex:1;min-width:160px;padding:8px 10px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a18;font-size:14px}
  .mode-btns{display:flex;gap:6px}
  .mode-btn{padding:8px 16px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#555;font-size:13px;cursor:pointer;transition:all .15s}
  .mode-btn.active{background:#e8e6e0;color:#1a1a18;border-color:#999}
  .stats{display:flex;gap:10px;margin-bottom:1rem}
  .stat{flex:1;background:#e8e6e0;border-radius:8px;padding:10px 14px;text-align:center}
  .stat-label{font-size:12px;color:#666;margin-bottom:4px}
  .stat-val{font-size:20px;font-weight:500;color:#1a1a18}
  .progress-bar{height:5px;background:#ddd;border-radius:3px;margin-bottom:1.25rem;overflow:hidden}
  .progress-fill{height:100%;background:#3a7bd5;border-radius:3px;transition:width .3s}
  .card{background:#fff;border:1px solid #ddd;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem}
  .lesson-tag{font-size:12px;color:#888;margin-bottom:8px}
  .question{font-size:16px;font-weight:500;color:#1a1a18;line-height:1.5;margin-bottom:1.25rem}
  .options{display:flex;flex-direction:column;gap:8px}
  .opt{padding:11px 15px;border:1px solid #ccc;border-radius:8px;cursor:pointer;font-size:14px;color:#1a1a18;background:#fff;text-align:left;transition:all .15s;line-height:1.5}
  .opt:hover:not(.disabled){background:#f5f4f0}
  .opt.correct{border-color:#2e7d52;background:#e6f4ec;color:#1b5e38}
  .opt.wrong{border-color:#b94040;background:#fdeaea;color:#7f1f1f}
  .opt.disabled{cursor:default}
  .next-btn{width:100%;padding:11px;border:1px solid #ccc;border-radius:8px;background:#f5f4f0;color:#1a1a18;font-size:14px;cursor:pointer;margin-top:10px;transition:all .15s}
  .next-btn:hover{border-color:#999}
  .result{text-align:center;padding:2rem 1.5rem}
  .big-score{font-size:48px;font-weight:500;color:#1a1a18;margin-bottom:8px}
  .result-msg{font-size:16px;color:#555;margin-bottom:1.5rem;line-height:1.6}
  .restart-btn{padding:10px 24px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a18;font-size:14px;cursor:pointer;margin:4px;transition:all .15s}
  .restart-btn:hover{background:#f5f4f0}
  .review-item{padding:10px 0;border-bottom:1px solid #eee;font-size:13px;line-height:1.6}
  .review-word{font-weight:500;color:#1a1a18}
  .review-def{color:#666;margin-top:2px}
  .review-miss{color:#b94040;font-size:12px}
  .flashcard{min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;user-select:none}
  .flash-hint{font-size:12px;color:#aaa;margin-bottom:12px}
  .flash-word{font-size:24px;font-weight:500;color:#1a1a18;margin-bottom:8px;text-align:center}
  .flash-def{font-size:15px;color:#555;text-align:center;line-height:1.6;max-width:500px}
  .flash-nav{display:flex;gap:10px;margin-top:1rem;justify-content:center}
</style>
</head>
<body>
<div class="wrap">
  <h1>Vocabulary Quiz</h1>
  <div class="top-bar">
    <select id="lesson-sel">
      <option value="all">All Lessons (150 words)</option>
      <option value="1">Lesson 1 — Language</option>
      <option value="2">Lesson 2 — Possibility</option>
      <option value="3">Lesson 3 — Change</option>
      <option value="4">Lesson 4 — Mind & Knowledge</option>
      <option value="5">Lesson 5 — Avoidance</option>
      <option value="6">Lesson 6 — Sequence</option>
      <option value="7">Lesson 7 — Criticism</option>
      <option value="8">Lesson 8 — Responsibility</option>
      <option value="9">Lesson 9 — Behavior</option>
      <option value="10">Lesson 10 — Skill</option>
      <option value="11">Lesson 11 — Commands</option>
      <option value="12">Lesson 12 — Size</option>
      <option value="13">Lesson 13 — Imitation</option>
      <option value="14">Lesson 14 — Pairs</option>
      <option value="15">Lesson 15 — Reversal</option>
    </select>
    <div class="mode-btns">
      <button class="mode-btn active" id="mode-quiz" onclick="setMode('quiz')">Quiz</button>
      <button class="mode-btn" id="mode-flash" onclick="setMode('flash')">Flashcards</button>
    </div>
  </div>
  <div id="app"></div>
</div>

<script>
const ALL = [
  {w:"annotation",d:"A critical or explanatory note",l:1},
  {w:"appellation",d:"A name, title, or designation",l:1},
  {w:"eponym",d:"A person whose name is the source of the name of something",l:1},
  {w:"linguistics",d:"The study of the nature, structure, and variation of language",l:1},
  {w:"malapropism",d:"Ridiculous misuse of a word by confusing it with one of similar sound",l:1},
  {w:"neologism",d:"A new word, expression, or usage",l:1},
  {w:"parlance",d:"A particular manner of speaking",l:1},
  {w:"patois",d:"A regional dialect, especially a nonstandard one with no written tradition",l:1},
  {w:"polyglot",d:"A person who speaks several languages; also: using several languages",l:1},
  {w:"vulgar",d:"Of or related to the language of the common people; crude, indecent",l:1},
  {w:"contingent",d:"Conditional; dependent on other things; also: a representative group within a larger group",l:2},
  {w:"eventuality",d:"Something that may occur; a possibility",l:2},
  {w:"implausible",d:"Difficult to believe; not likely or credible",l:2},
  {w:"inconceivable",d:"Impossible to comprehend or fully grasp; so unlikely as to seem impossible",l:2},
  {w:"in vain",d:"Without success; completely ineffective",l:2},
  {w:"perchance",d:"Perhaps; possibly",l:2},
  {w:"preposterous",d:"Absurd; contrary to nature, reason, or common sense",l:2},
  {w:"proclivity",d:"A natural inclination; a tendency",l:2},
  {w:"prone",d:"Having a tendency; inclined; likely to do or have something",l:2},
  {w:"theoretical",d:"Restricted to ideas; abstract or unproven",l:2},
  {w:"evolve",d:"To develop or achieve gradually",l:3},
  {w:"immutable",d:"Unchangeable; not subject or susceptible to change",l:3},
  {w:"inveterate",d:"Firmly established and having existed for a long time; deep-rooted; habitual",l:3},
  {w:"malleable",d:"Capable of being shaped or formed; easily controlled or influenced",l:3},
  {w:"metamorphosis",d:"A marked change in form, character, or function; a transformation",l:3},
  {w:"modulate",d:"To adjust or adapt to a certain level or proportion; to regulate",l:3},
  {w:"protean",d:"Readily taking on different forms, characteristics, or meanings",l:3},
  {w:"sporadic",d:"Scattered; occurring at irregular intervals; isolated; infrequent",l:3},
  {w:"transmute",d:"To change from one form to another; to transform",l:3},
  {w:"volatile",d:"Tending to vary often; inconstant; tending toward violence; explosive",l:3},
  {w:"abstruse",d:"Difficult to understand",l:4},
  {w:"acumen",d:"Quickness and keenness of insight or judgment",l:4},
  {w:"ascertain",d:"To discover or determine with certainty through examination or experimentation",l:4},
  {w:"cerebral",d:"Of or relating to the brain; appealing to the intellect",l:4},
  {w:"faculty",d:"A natural power or ability; a division of a university or group of teachers",l:4},
  {w:"obfuscate",d:"To make difficult to understand; to darken or make dim",l:4},
  {w:"ruminate",d:"To think deeply about; to turn a matter over and over in one's mind",l:4},
  {w:"stymie",d:"To prevent from making progress; to frustrate or thwart efforts",l:4},
  {w:"surmise",d:"To guess; to draw a conclusion without sufficient evidence",l:4},
  {w:"tenet",d:"A principle or belief held by a person or organization",l:4},
  {w:"abeyance",d:"Suspension; a condition of being temporarily set aside",l:5},
  {w:"abstemious",d:"Eating and drinking little or in moderation; restricted to bare necessities",l:5},
  {w:"circumvent",d:"To get around by clever maneuvering; to avoid by going around",l:5},
  {w:"elude",d:"To escape from by daring or cleverness; to escape the grasp or understanding of",l:5},
  {w:"eschew",d:"To avoid, especially on moral or practical grounds; to abstain from",l:5},
  {w:"evasion",d:"The act of escaping or avoiding by cleverness or deceit",l:5},
  {w:"malinger",d:"To pretend to be ill or injured in order to avoid duty or work",l:5},
  {w:"oblique",d:"Indirect; intentionally vague or ambiguous; misleading, devious, or dishonest",l:5},
  {w:"shirk",d:"To neglect, put off, or avoid a duty or responsibility",l:5},
  {w:"shun",d:"To willfully ignore; to stay away from",l:5},
  {w:"converge",d:"To come together at the same point from different directions; to meet",l:6},
  {w:"crux",d:"The main, central, or critical point or feature",l:6},
  {w:"degradation",d:"A decline to a lower condition, quality, or level",l:6},
  {w:"initiate",d:"To take the first steps in a process; to formally admit someone into an organization through a ritual",l:6},
  {w:"penultimate",d:"Second from the last; next to last",l:6},
  {w:"pivotal",d:"Being of vital importance; crucial",l:6},
  {w:"sequel",d:"A continuation; something that follows; the next installment of something",l:6},
  {w:"supersede",d:"To replace; to take the place of",l:6},
  {w:"tangential",d:"Superficially relevant; only slightly connected",l:6},
  {w:"terminate",d:"To bring to an end or halt",l:6},
  {w:"aspersions",d:"Attacks on a person's character or honesty; damaging or unfavorable remarks",l:7},
  {w:"compunction",d:"A strong uneasiness caused by a sense of guilt; a sting of conscience",l:7},
  {w:"derision",d:"Hateful or mocking laughter; ridicule",l:7},
  {w:"disapprobation",d:"Moral disapproval",l:7},
  {w:"ostracize",d:"To banish or exclude from a group; to shun",l:7},
  {w:"rebuke",d:"To criticize sharply; also: strong criticism",l:7},
  {w:"revulsion",d:"A sudden, intense feeling of disgust",l:7},
  {w:"scurrilous",d:"Vulgar, coarse, or abusive in expression; foul-mouthed",l:7},
  {w:"spurn",d:"To reject scornfully",l:7},
  {w:"vitriolic",d:"Intensely and bitterly harsh; stinging",l:7},
  {w:"accountable",d:"Responsible; required to answer for one's actions; explainable",l:8},
  {w:"assiduous",d:"Giving constant attention; hard-working; conscientious",l:8},
  {w:"default",d:"A situation that remains in effect unless specifically changed; failure to meet an obligation",l:8},
  {w:"feckless",d:"Ineffective; feeble; useless; careless and irresponsible",l:8},
  {w:"incumbent",d:"Imposed as a duty; currently holding a position or office",l:8},
  {w:"liability",d:"A legal responsibility or obligation; something that holds one back",l:8},
  {w:"mandatory",d:"Required or commanded by authority",l:8},
  {w:"negligence",d:"Lack of proper care or attention",l:8},
  {w:"onerous",d:"Difficult to bear, carry, or do; troublesome; burdensome",l:8},
  {w:"remiss",d:"Lax or careless in attending to duty",l:8},
  {w:"acquiesce",d:"To agree or accept passively or without protest",l:9},
  {w:"adamant",d:"Stubbornly determined; not swayed by pleas, appeals, or reason",l:9},
  {w:"balk",d:"To stubbornly refuse to do something; to stop short and refuse to go on",l:9},
  {w:"camaraderie",d:"Comradeship; lighthearted good will and friendliness among companions",l:9},
  {w:"cantankerous",d:"Disagreeable; bad-tempered; likely to quarrel",l:9},
  {w:"compliance",d:"The act of going along with a request, demand, or rule; obedience",l:9},
  {w:"presumptuous",d:"Excessively bold or forward; going beyond what is proper or right",l:9},
  {w:"propitiate",d:"To soothe bad feelings; to appease; to regain friendship or good will",l:9},
  {w:"tractable",d:"Easily managed or controlled",l:9},
  {w:"volition",d:"The power of choosing or deciding; free will",l:9},
  {w:"acuity",d:"Sharpness of vision or perception",l:10},
  {w:"consummate",d:"Supremely accomplished or skilled; to bring to completion or fulfillment",l:10},
  {w:"cunning",d:"Marked by sly deception; crafty; skill in deception or dexterity in performance",l:10},
  {w:"deft",d:"Quick and skillful",l:10},
  {w:"endowment",d:"A natural gift, ability, or quality; funds donated to an institution",l:10},
  {w:"facile",d:"Easy; achieved with little effort; working with effortless ease and fluency",l:10},
  {w:"inept",d:"Lacking skill or judgment; incompetent; clumsy",l:10},
  {w:"prescient",d:"Having foreknowledge of events before they occur",l:10},
  {w:"proficient",d:"Able to do something very well; highly skilled; expert",l:10},
  {w:"prowess",d:"Superior strength, skill, courage, or daring",l:10},
  {w:"beseech",d:"To request earnestly; to implore or beg",l:11},
  {w:"cajole",d:"To urge with gentle, repeated appeals or flattery; to wheedle",l:11},
  {w:"elicit",d:"To bring out or call forth",l:11},
  {w:"enjoin",d:"To direct or order with authority; to prohibit or forbid",l:11},
  {w:"exigency",d:"The state of requiring much effort or immediate action; an urgent crisis",l:11},
  {w:"imperious",d:"Arrogantly bossy; domineering; overbearing",l:11},
  {w:"injunction",d:"A command, a directive, or an order",l:11},
  {w:"mendicant",d:"Dependent on begging for a living; a beggar",l:11},
  {w:"query",d:"A question; an inquiry; to question, often with doubt",l:11},
  {w:"servile",d:"Slavish; behaving like a servant; excessively submissive",l:11},
  {w:"abound",d:"To be great in number or amount",l:12},
  {w:"amplitude",d:"Greatness of size or range; magnitude",l:12},
  {w:"augment",d:"To add to; to increase the size, extent, or quantity of",l:12},
  {w:"behemoth",d:"Something enormous in size or power",l:12},
  {w:"brevity",d:"The quality of being short in duration; briefness; brief or concise expression",l:12},
  {w:"diminish",d:"To make or become smaller or less; to lessen authority, reputation, or prestige",l:12},
  {w:"infinitesimal",d:"Too small to measure or calculate",l:12},
  {w:"modicum",d:"A small or token amount",l:12},
  {w:"prodigious",d:"Impressively great in size, force, or extent; extraordinary; marvelous",l:12},
  {w:"quotidian",d:"Everyday; commonplace",l:12},
  {w:"banal",d:"Unoriginal and commonplace; trite",l:13},
  {w:"camouflage",d:"Concealment by disguise or coloring that matches surroundings; to hide by blending in",l:13},
  {w:"emulate",d:"To strive to equal or excel, especially through imitation",l:13},
  {w:"mimicry",d:"Imitation or copying, especially of expression and gesture",l:13},
  {w:"platitude",d:"An overused, dull, and unoriginal phrase or statement",l:13},
  {w:"prototype",d:"An original type, form, or instance serving as a basis or standard; an early typical example",l:13},
  {w:"redundant",d:"Extra; exceeding what is necessary; repetitive or needlessly wordy",l:13},
  {w:"rendition",d:"An interpretation or a performance of a musical or dramatic piece",l:13},
  {w:"sham",d:"Something false presented as genuine; not genuine; to put on a false appearance",l:13},
  {w:"simulation",d:"An imitation, representation, or reproduction of a situation or experience",l:13},
  {w:"adverse",d:"Opposing; contrary to one's interests; harmful or unfavorable",l:14},
  {w:"averse",d:"Referring to a feeling of avoidance and dislike",l:14},
  {w:"ingenious",d:"Marked by inventive skill and imagination; extremely clever",l:14},
  {w:"ingenuous",d:"Unable to deceive; openly straightforward",l:14},
  {w:"persecute",d:"To continuously mistreat or be cruel to someone; to annoy persistently",l:14},
  {w:"prosecute",d:"To bring an action in a court of law; to continue an activity until it is completed",l:14},
  {w:"quorum",d:"The minimum number of people who must be present to make a decision",l:14},
  {w:"quota",d:"The amount of goods assigned to a person; a number representing an upper limit or required minimum",l:14},
  {w:"respectfully",d:"With regard and esteem; politely",l:14},
  {w:"respectively",d:"Referring to things or people in the order given",l:14},
  {w:"abdicate",d:"To formally give up control, authority, or a high office",l:15},
  {w:"absolve",d:"To clear of guilt or blame; to relieve from a requirement or obligation",l:15},
  {w:"catharsis",d:"A purifying or refreshing release of emotional tension",l:15},
  {w:"countermand",d:"To cancel or reverse an order or a policy",l:15},
  {w:"impunity",d:"Exemption from punishment or injury",l:15},
  {w:"recant",d:"To formally take back or reject a statement or belief",l:15},
  {w:"recoup",d:"To regain; to make up for",l:15},
  {w:"renounce",d:"To give up by formal announcement; to reject; to disown",l:15},
  {w:"rescind",d:"To take back; to make void; to repeal",l:15},
  {w:"waive",d:"To give up voluntarily; to refrain from insisting on or enforcing",l:15}
];

let mode='quiz', pool=[], queue=[], current=0, score=0, answered=false, wrong=[], flashIdx=0, flashFlipped=false;

function getPool(){
  const sel=document.getElementById('lesson-sel').value;
  return sel==='all'?[...ALL]:ALL.filter(x=>x.l==sel);
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function setMode(m){
  mode=m;
  document.getElementById('mode-quiz').className='mode-btn'+(m==='quiz'?' active':'');
  document.getElementById('mode-flash').className='mode-btn'+(m==='flash'?' active':'');
  startSession();
}

function startSession(){
  pool=getPool();
  queue=shuffle([...pool]);
  current=0;score=0;answered=false;wrong=[];flashIdx=0;flashFlipped=false;
  render();
}

document.getElementById('lesson-sel').addEventListener('change',startSession);

function makeOptions(item){
  const w3=shuffle(pool.filter(x=>x.w!==item.w)).slice(0,3);
  return shuffle([item,...w3]);
}

function render(){
  const app=document.getElementById('app');
  if(mode==='flash'){renderFlash(app);return;}
  if(current>=queue.length){renderResult(app);return;}
  const item=queue[current];
  const opts=makeOptions(item);
  const pct=Math.round((current/queue.length)*100);
  app.innerHTML=`
    <div class="stats">
      <div class="stat"><div class="stat-label">Question</div><div class="stat-val">${current+1}/${queue.length}</div></div>
      <div class="stat"><div class="stat-label">Correct</div><div class="stat-val">${score}</div></div>
      <div class="stat"><div class="stat-label">Score</div><div class="stat-val">${current>0?Math.round(score/current*100):0}%</div></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="card">
      <div class="lesson-tag">Lesson ${item.l}</div>
      <div class="question">What does <strong>${item.w}</strong> mean?</div>
      <div class="options" id="opts">
        ${opts.map((o,i)=>`<button class="opt" id="opt-${i}" onclick="pick(${i},'${o.w}','${item.w}')">${o.d}</button>`).join('')}
      </div>
      <button class="next-btn" id="nxt" style="display:none" onclick="nextQ()">Next →</button>
    </div>`;
}

function pick(idx,chosen,correct){
  if(answered)return;
  answered=true;
  if(chosen===correct){score++;}else{wrong.push(queue[current]);}
  const item=queue[current];
  const opts=document.getElementById('opts').children;
  for(let i=0;i<opts.length;i++){
    opts[i].classList.add('disabled');
    if(opts[i].textContent.trim()===item.d){opts[i].classList.add('correct');}
    else if(i===idx&&chosen!==correct){opts[i].classList.add('wrong');}
  }
  document.getElementById('nxt').style.display='block';
}

function nextQ(){answered=false;current++;render();}

function renderResult(app){
  const pct=Math.round(score/queue.length*100);
  const msg=pct>=90?'Outstanding! You really know your vocab.':pct>=70?'Good work — a bit more practice and you\'ll nail it.':pct>=50?'Getting there! Review the missed words and try again.':'Keep studying — you\'ve got this!';
  const rev=wrong.length?`<div style="margin-top:1.5rem;text-align:left">
    <div style="font-size:13px;font-weight:500;color:#666;margin-bottom:8px">Words to review (${wrong.length})</div>
    ${wrong.map(w=>`<div class="review-item"><span class="review-word">${w.w}</span> <span class="review-miss">✗</span><div class="review-def">${w.d}</div></div>`).join('')}
  </div>`:'<div style="margin-top:1rem;font-size:14px;color:#2e7d52">Perfect score — no words to review!</div>';
  app.innerHTML=`<div class="card result">
    <div class="big-score">${score}/${queue.length}</div>
    <div class="result-msg">${pct}% correct — ${msg}</div>
    <button class="restart-btn" onclick="startSession()">Retake quiz</button>
    ${wrong.length?`<button class="restart-btn" onclick="retakeWrong()">Study missed words only</button>`:''}
    ${rev}
  </div>`;
}

function retakeWrong(){queue=shuffle([...wrong]);current=0;score=0;answered=false;wrong=[];render();}

function renderFlash(app){
  if(!pool.length){app.innerHTML='<div class="card" style="text-align:center;color:#888;padding:2rem">No words in this selection.</div>';return;}
  if(flashIdx>=pool.length)flashIdx=0;
  const item=pool[flashIdx];
  app.innerHTML=`
    <div class="stats">
      <div class="stat"><div class="stat-label">Card</div><div class="stat-val">${flashIdx+1}/${pool.length}</div></div>
      <div class="stat"><div class="stat-label">Lesson</div><div class="stat-val">${item.l}</div></div>
    </div>
    <div class="card flashcard" onclick="flipCard()">
      <div class="flash-hint">${flashFlipped?'Definition — tap to flip':'Word — tap to reveal definition'}</div>
      <div class="flash-word">${flashFlipped?item.d:item.w}</div>
      ${flashFlipped?`<div style="font-size:12px;color:#aaa;margin-top:6px">Lesson ${item.l}</div>`:''}
    </div>
    <div class="flash-nav">
      <button class="restart-btn" onclick="flashNav(-1)">← Prev</button>
      <button class="restart-btn" onclick="shuffleFlash()">Shuffle</button>
      <button class="restart-btn" onclick="flashNav(1)">Next →</button>
    </div>`;
}

function flipCard(){flashFlipped=!flashFlipped;renderFlash(document.getElementById('app'));}
function flashNav(d){flashIdx=(flashIdx+d+pool.length)%pool.length;flashFlipped=false;renderFlash(document.getElementById('app'));}
function shuffleFlash(){pool=shuffle([...pool]);flashIdx=0;flashFlipped=false;renderFlash(document.getElementById('app'));}

startSession();
</script>
</body>
</html>
